<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Login Form</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome Link for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<style>
/* Reset basic styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Background Setup */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    /* Using a high-quality landscape image similar to your image */
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop') no-repeat;
    background-size: cover;
    background-position: center;
}

/* Glassmorphism Login Card */
.login-container {
    width: 400px;
    padding: 40px;
    background: rgba(255, 255, 255, 0.1); /* Semi-transparent white */
    border: 2px solid rgba(255, 255, 255, 0.2); /* Soft border */
    backdrop-filter: blur(15px); /* This creates the frosted glass effect */
    -webkit-backdrop-filter: blur(15px); /* Safari support */
    border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    text-align: center;
    color: #fff;
}

.login-container h2 {
    font-size: 2rem;
    margin-bottom: 30px;
    font-weight: 600;
}

/* Input Fields Wrapper */
.input-box {
    position: relative;
    width: 100%;
    margin-bottom: 20px;
}

.input-box input {
    width: 100%;
    padding: 12px 40px 12px 15px; /* Extra padding on right for the icon */
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 30px;
    outline: none;
    font-size: 16px;
    color: #fff;
    transition: 0.3s;
}

/* Placeholder color */
.input-box input::placeholder {
    color: rgba(255, 255, 255, 0.7);
}

.input-box input:focus {
    background: rgba(255, 255, 255, 0.3);
    border-color: #fff;
}

/* Input Icons styling */
.input-box i {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255, 255, 255, 0.8);
    font-size: 16px;
}

/* Remember Me & Forget Password container */
.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-bottom: 25px;
    padding: 0 5px;
}

.form-options label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
}

.form-options a {
    color: #fff;
    text-decoration: none;
}

.form-options a:hover {
    text-decoration: underline;
}

/* Login Button styling */
.btn {
    width: 100%;
    padding: 12px;
    background: #fff;
    border: none;
    outline: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn:hover {
    background: rgba(255, 255, 255, 0.9);
    transform: scale(1.02);
}

/* Bottom Registration Link */
.register-link {
    font-size: 14px;
    margin-top: 25px;
}

.register-link a {
    color: #fff;
    text-decoration: none;
    font-weight: 600;
}

.register-link a:hover {
    text-decoration: underline;
}
</style>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <form action="#">
            
            <!-- Username Input Group -->
            <div class="input-box">
                <input type="text" placeholder="UserName" required>
                <i class="fa-solid fa-user"></i>
            </div>

            <!-- Password Input Group -->
            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-options">
                <label>
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#">Forget Password</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn">Login</button>

            <!-- Register Link -->
            <div class="register-link">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>

        </form>
    </div>

</body>
</html>
